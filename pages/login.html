<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LAGER//APP">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – LAGER//APP</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-header {
      text-align: center;
    }

    .login-logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .login-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--text2);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
    }

    .form-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
    }

    .form-input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 12px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { background: var(--accent-hover); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      text-align: center;
    }

    .divider-text {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .back-link {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .back-link a {
      color: var(--accent2);
      text-decoration: none;
    }

    .back-link a:hover { text-decoration: underline; }

    .spinner-sm {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="login-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="nav-logo" style="padding:0;"><img src="../LAGER_APP.png" alt="LAGER//APP" style="height:32px;width:auto;display:block;object-fit:contain;"></a>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </nav>

  <main class="login-main">
    <div class="login-box">

      <div class="login-header">
        <div class="login-logo">LAGER//APP</div>
        <h1 class="login-title">Anmelden</h1>
        <p class="login-sub">Wachenleiter & Admin Zugang</p>
      </div>

      <div class="login-card">
        <div class="form-group">
          <label class="form-label">E-Mail</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="name@drk-boeblingen.de"
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label">Passwort</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
          >
        </div>

        <div id="error-msg" class="error-msg hidden"></div>

        <button class="btn-login" id="btn-login" onclick="doLogin()">
          🔐 Anmelden
        </button>

        <div class="divider-text">oder</div>

        <a href="../index.html" class="btn-login" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);">
          🔍 Zur Lagersuche
        </a>
      </div>

      <div class="back-link">
        Mitarbeiter? <a href="check.html">→ Zum Lagercheck</a>
      </div>

    </div>
  </main>

  <script type="module">
    import { initializeApp }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword }
                                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc }
                                     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Theme
    const savedTheme  = localStorage.getItem('lager-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme       = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';

    window.toggleTheme = function() {
      const cur  = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('lager-theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    };

    // Firebase
    const firebaseConfig = {
      apiKey:            "AIzaSyD1YY-cFQxyykfYQYPORwulzuF8t6Wgid4",
      authDomain:        "lagerbestellung-19970.firebaseapp.com",
      projectId:         "lagerbestellung-19970",
      storageBucket:     "lagerbestellung-19970.firebasestorage.app",
      messagingSenderId: "939056339904",
      appId:             "1:939056339904:web:6f33ca2f5a4cebd2780625",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Already logged in?
    auth.onAuthStateChanged(async user => {
      if (user) {
        const role = await getRole(user.uid);
        redirectByRole(role);
      }
    });

    async function getRole(uid) {
      try {
        const snap = await getDoc(doc(db, 'users', uid));
        return snap.exists() ? snap.data().role : 'mitarbeiter';
      } catch { return 'mitarbeiter'; }
    }

    function redirectByRole(role) {
      if (role === 'admin')             window.location.href = 'admin.html';
      else if (role === 'wachenleiter') window.location.href = 'portal.html';
      else window.location.href = '../index.html';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    window.doLogin = async function() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn-login');

      if (!email || !password) { showError('Bitte E-Mail und Passwort eingeben.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner-sm"></div> Anmelden...';
      document.getElementById('error-msg').classList.add('hidden');

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const role = await getRole(cred.user.uid);
        redirectByRole(role);
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '🔐 Anmelden';
        const msgs = {
          'auth/user-not-found':   'E-Mail nicht gefunden.',
          'auth/wrong-password':   'Falsches Passwort.',
          'auth/invalid-email':    'Ungültige E-Mail-Adresse.',
          'auth/too-many-requests':'Zu viele Versuche. Bitte warte kurz.',
          'auth/invalid-credential': 'E-Mail oder Passwort falsch.',
        };
        showError(msgs[e.code] || `Fehler: ${e.message}`);
      }
    };

    // Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>

  <script src="../js/pwa.js"></script>
</body>
</html>

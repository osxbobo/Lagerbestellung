<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagercheck – LAGER//APP</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .check-page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── PIN SCREEN ── */
    .pin-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .pin-box {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .pin-header { text-align: center; }
    .pin-logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
    .pin-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .pin-sub   { font-size: 0.82rem; color: var(--text2); }

    .pin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 8px 0;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      transition: all 0.15s;
    }

    .pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .pin-key {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-key:hover  { border-color: var(--accent); color: var(--accent); background: var(--surface3); }
    .pin-key:active { transform: scale(0.94); }
    .pin-key.confirm { background: var(--accent); border-color: var(--accent); color: white; }
    .pin-key.confirm:hover { background: var(--accent-hover); }
    .pin-key.del    { color: var(--muted); }

    .name-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      text-align: center;
    }

    .name-input:focus { border-color: var(--accent2); }
    .name-input::placeholder { color: var(--muted); }

    .pin-error {
      text-align: center;
      font-size: 0.78rem;
      color: var(--red);
      min-height: 20px;
    }

    /* ── CHECK SCREEN ── */
    .check-screen { flex: 1; display: flex; flex-direction: column; }

    .check-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 56px;
      z-index: 10;
    }

    .check-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .check-bereich {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.85rem;
    }

    .check-nav {
      display: flex;
      gap: 8px;
    }

    .nav-arrow {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .nav-arrow:hover  { border-color: var(--accent); color: var(--accent); }
    .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

    .check-body {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .artikel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .artikel-card.ok      { border-left: 3px solid var(--green); }
    .artikel-card.warn    { border-left: 3px solid var(--red); }

    .artikel-info { flex: 1; min-width: 0; }
    .artikel-name { font-size: 0.82rem; font-weight: 600; }
    .artikel-sub  { font-size: 0.65rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
    .artikel-soll { font-size: 0.68rem; color: var(--text2); margin-top: 3px; }

    .info-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--accent2);
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .info-btn:hover { border-color: var(--accent2); }

    .ist-input {
      width: 64px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .ist-input:focus  { border-color: var(--accent2); }
    .ist-input.low    { border-color: var(--red); color: var(--red); }
    .ist-input.good   { border-color: var(--green); }

    /* ── UNTERSCHRIFT SCREEN ── */
    .sig-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .sig-box {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sig-title { font-size: 1.1rem; font-weight: 700; text-align: center; }

    .summary-grid {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: var(--muted); }
    .summary-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; font-weight: 600; }

    .sig-canvas-wrap {
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    #sig-canvas {
      display: block;
      width: 100%;
      height: 140px;
      cursor: crosshair;
      touch-action: none;
    }

    .sig-line {
      position: absolute;
      bottom: 28px;
      left: 16px;
      right: 16px;
      height: 1px;
      background: var(--border);
      pointer-events: none;
    }

    .sig-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.72rem;
      color: var(--muted);
      pointer-events: none;
      font-family: 'IBM Plex Mono', monospace;
      transition: opacity 0.2s;
    }

    .sig-clear {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.65rem;
      padding: 3px 8px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hidden { display: none !important; }

    /* Responsive */
    @media (min-width: 641px) {
      .check-body { padding: 20px 24px; }
      .artikel-card { padding: 16px 20px; }
    }
  </style>
</head>
<body class="check-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="nav-logo">LAGER<span>//</span>APP</a>
      <div class="nav-right">
        <span id="nav-user" class="mono text-xs text-muted hide-mobile"></span>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </nav>

  <!-- ── PIN SCREEN ── -->
  <div id="screen-pin" class="pin-screen">
    <div class="pin-box">
      <div class="pin-header">
        <div class="pin-logo">LAGER//APP</div>
        <h1 class="pin-title">Lagercheck</h1>
        <p class="pin-sub">PIN eingeben und Name eintragen</p>
      </div>

      <div class="pin-card">
        <input type="text" id="name-input" class="name-input" placeholder="Dein Name..." maxlength="40">

        <div class="pin-dots">
          <div class="pin-dot" id="dot-0"></div>
          <div class="pin-dot" id="dot-1"></div>
          <div class="pin-dot" id="dot-2"></div>
          <div class="pin-dot" id="dot-3"></div>
        </div>

        <div class="pin-grid">
          <div class="pin-key" onclick="pinKey('1')">1</div>
          <div class="pin-key" onclick="pinKey('2')">2</div>
          <div class="pin-key" onclick="pinKey('3')">3</div>
          <div class="pin-key" onclick="pinKey('4')">4</div>
          <div class="pin-key" onclick="pinKey('5')">5</div>
          <div class="pin-key" onclick="pinKey('6')">6</div>
          <div class="pin-key" onclick="pinKey('7')">7</div>
          <div class="pin-key" onclick="pinKey('8')">8</div>
          <div class="pin-key" onclick="pinKey('9')">9</div>
          <div class="pin-key del" onclick="pinDel()">⌫</div>
          <div class="pin-key" onclick="pinKey('0')">0</div>
          <div class="pin-key confirm" onclick="pinConfirm()">✓</div>
        </div>

        <div class="pin-error" id="pin-error"></div>
      </div>
    </div>
  </div>

  <!-- ── CHECK SCREEN ── -->
  <div id="screen-check" class="check-screen hidden">
    <div class="check-header">
      <div class="check-meta">
        <span class="check-bereich" id="check-bereich-name">Bereich</span>
        <div class="check-nav">
          <button class="nav-arrow" id="btn-prev" onclick="prevBereich()">←</button>
          <button class="nav-arrow" id="btn-next" onclick="nextBereich()">→</button>
        </div>
      </div>
      <div>
        <div class="progress-wrap"><div class="progress-fill" id="check-progress"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:3px;">
          <span id="check-progress-label">Bereich 1 von 1</span>
          <span id="check-progress-pct">0%</span>
        </div>
      </div>
    </div>

    <div class="check-body" id="check-body"></div>

    <div style="padding:16px 20px;max-width:800px;margin:0 auto;width:100%;">
      <button class="btn btn-primary btn-full" onclick="showSignature()">✅ Check abschließen & unterschreiben</button>
    </div>
  </div>

  <!-- ── UNTERSCHRIFT SCREEN ── -->
  <div id="screen-sig" class="sig-screen hidden">
    <div class="sig-box">
      <div class="sig-title">✅ Check abgeschlossen</div>

      <div class="summary-grid" id="summary-grid"></div>

      <div>
        <div class="section-label mb-8">Unterschrift</div>
        <div class="sig-canvas-wrap">
          <canvas id="sig-canvas"></canvas>
          <div class="sig-line"></div>
          <div class="sig-hint" id="sig-hint">Hier unterschreiben...</div>
          <button class="sig-clear" onclick="clearSig()">Löschen</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="submitCheck()">📄 PDF erstellen & absenden</button>
      <button class="btn btn-ghost btn-full" onclick="backToCheck()">← Zurück zum Check</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc, addDoc, serverTimestamp }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ── Theme ──
    const savedTheme  = localStorage.getItem('lager-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme       = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';

    window.toggleTheme = function() {
      const cur  = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('lager-theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    };

    // ── Firebase ──
    const firebaseConfig = {
      apiKey:            "AIzaSyD1YY-cFQxyykfYQYPORwulzuF8t6Wgid4",
      authDomain:        "lagerbestellung-19970.firebaseapp.com",
      projectId:         "lagerbestellung-19970",
      storageBucket:     "lagerbestellung-19970.firebasestorage.app",
      messagingSenderId: "939056339904",
      appId:             "1:939056339904:web:6f33ca2f5a4cebd2780625",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let correctPin   = '1234';
    let alleArtikel  = [];
    let alleBereiche = [];
    let istMengen    = {}; // artikelId → Wert
    let currentIdx   = 0;
    let userName     = '';

    // ── PIN Logic ──
    let pinValue = '';

    window.pinKey = function(digit) {
      if (pinValue.length >= 4) return;
      pinValue += digit;
      updateDots();
    };

    window.pinDel = function() {
      pinValue = pinValue.slice(0, -1);
      updateDots();
    };

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot-${i}`).classList.toggle('filled', i < pinValue.length);
      }
    }

    window.pinConfirm = async function() {
      userName = document.getElementById('name-input').value.trim();
      if (!userName) {
        document.getElementById('pin-error').textContent = 'Bitte deinen Namen eingeben.';
        return;
      }
      if (pinValue.length < 4) {
        document.getElementById('pin-error').textContent = 'Bitte 4-stelligen PIN eingeben.';
        return;
      }

      // PIN aus Firestore laden
      try {
        const configSnap = await getDoc(doc(db, 'config', 'app'));
        if (configSnap.exists()) correctPin = configSnap.data().pin || '1234';
      } catch {}

      if (pinValue !== correctPin) {
        document.getElementById('pin-error').textContent = 'Falscher PIN. Bitte nochmal versuchen.';
        pinValue = '';
        updateDots();
        return;
      }

      document.getElementById('nav-user').textContent = userName;
      await loadCheckData();
      showScreen('check');
    };

    // ── Load Data ──
    async function loadCheckData() {
      const [bSnap, aSnap] = await Promise.all([
        getDocs(query(collection(db, 'bereiche'), orderBy('reihenfolge'))),
        getDocs(collection(db, 'artikel')),
      ]);
      alleBereiche = bSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      alleArtikel  = aSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderBereich(0);
    }

    // ── Check Logic ──
    function renderBereich(idx) {
      currentIdx = idx;
      const bereich  = alleBereiche[idx];
      const artikel  = alleArtikel.filter(a => a.bereich === bereich.id);
      const pct      = Math.round(((idx + 1) / alleBereiche.length) * 100);

      document.getElementById('check-bereich-name').textContent = bereich.name;
      document.getElementById('check-progress').style.width      = pct + '%';
      document.getElementById('check-progress-label').textContent =
        `Bereich ${idx + 1} von ${alleBereiche.length}`;
      document.getElementById('check-progress-pct').textContent = pct + '%';
      document.getElementById('btn-prev').disabled = idx === 0;
      document.getElementById('btn-next').disabled = idx === alleBereiche.length - 1;

      document.getElementById('check-body').innerHTML = artikel.map(a => {
        const ist = istMengen[a.id] ?? '';
        const low = ist !== '' && a.min != null && Number(ist) < a.min;
        const good = ist !== '' && a.min != null && Number(ist) >= a.min;
        return `
          <div class="artikel-card ${low ? 'warn' : good ? 'ok' : ''}">
            <div class="artikel-info">
              <div class="artikel-name">${a.name}</div>
              <div class="artikel-sub">${a.lp || ''} · ${a.location || ''}</div>
              ${a.min != null ? `<div class="artikel-soll">MIN ${a.min} ${a.minEinheit||''} · MAX ${a.max} ${a.maxEinheit||''}</div>` : ''}
              ${a.hinweis ? `<div class="artikel-soll" style="color:var(--accent2)">💡 ${a.hinweis}</div>` : ''}
            </div>
            ${a.fotoUrl ? `<button class="info-btn" onclick="openFoto('${a.fotoUrl}','${a.name.replace(/'/g,"\\'")}')">ℹ</button>` : ''}
            <input
              class="ist-input ${low ? 'low' : good ? 'good' : ''}"
              type="number"
              inputmode="numeric"
              placeholder="Ist"
              value="${ist}"
              onchange="setIst('${a.id}', this.value, this)"
              min="0"
            >
          </div>`;
      }).join('') || `<div class="text-muted text-sm" style="padding:20px;text-align:center;">Keine Artikel in diesem Bereich</div>`;
    }

    window.setIst = function(id, val, input) {
      istMengen[id] = val;
      const a   = alleArtikel.find(x => x.id === id);
      const low = val !== '' && a?.min != null && Number(val) < a.min;
      const good= val !== '' && a?.min != null && Number(val) >= a.min;
      input.className = `ist-input ${low ? 'low' : good ? 'good' : ''}`;
      input.closest('.artikel-card').className = `artikel-card ${low ? 'warn' : good ? 'ok' : ''}`;
    };

    window.prevBereich = () => { if (currentIdx > 0) renderBereich(currentIdx - 1); };
    window.nextBereich = () => { if (currentIdx < alleBereiche.length - 1) renderBereich(currentIdx + 1); };

    // ── Signature ──
    window.showSignature = function() {
      const filled    = Object.keys(istMengen).length;
      const total     = alleArtikel.length;
      const nachbest  = alleArtikel.filter(a =>
        istMengen[a.id] !== undefined && a.min != null && Number(istMengen[a.id]) < a.min
      ).length;

      document.getElementById('summary-grid').innerHTML = `
        <div class="summary-row"><span class="summary-key">Mitarbeiter</span><span class="summary-val">${userName}</span></div>
        <div class="summary-row"><span class="summary-key">Datum</span><span class="summary-val">${new Date().toLocaleDateString('de-DE')} · ${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span></div>
        <div class="summary-row"><span class="summary-key">Geprüfte Artikel</span><span class="summary-val">${filled} / ${total}</span></div>
        <div class="summary-row"><span class="summary-key">Nachbestellen</span><span class="summary-val" style="color:${nachbest>0?'var(--red)':'var(--green)'}">${nachbest} Artikel</span></div>
      `;

      showScreen('sig');
      initCanvas();
    };

    window.backToCheck = () => showScreen('check');

    // ── Canvas Signature ──
    let drawing = false;
    let hasSig  = false;

    function initCanvas() {
      const canvas = document.getElementById('sig-canvas');
      const ctx    = canvas.getContext('2d');
      const wrap   = canvas.parentElement;
      canvas.width  = wrap.clientWidth;
      canvas.height = 140;

      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      ctx.lineWidth   = 2.5;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';

      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - r.left) * (canvas.width / r.width),
                 y: (t.clientY - r.top)  * (canvas.height / r.height) };
      }

      canvas.addEventListener('mousedown',  e => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
      canvas.addEventListener('mousemove',  e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; document.getElementById('sig-hint').style.opacity = '0'; });
      canvas.addEventListener('mouseup',    () => drawing = false);
      canvas.addEventListener('mouseleave', () => drawing = false);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }, { passive: false });
      canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; document.getElementById('sig-hint').style.opacity = '0'; }, { passive: false });
      canvas.addEventListener('touchend',   () => drawing = false);
    }

    window.clearSig = function() {
      const canvas = document.getElementById('sig-canvas');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      hasSig = false;
      document.getElementById('sig-hint').style.opacity = '1';
    };

    // ── Submit ──
    window.submitCheck = async function() {
      if (!hasSig) {
        alert('Bitte zuerst unterschreiben!');
        return;
      }

      const canvas   = document.getElementById('sig-canvas');
      const sigData  = canvas.toDataURL('image/png');
      const nachbest = alleArtikel.filter(a =>
        istMengen[a.id] !== undefined && a.min != null && Number(istMengen[a.id]) < a.min
      );

      try {
        await addDoc(collection(db, 'bestellungen'), {
          mitarbeiter:  userName,
          datum:        serverTimestamp(),
          istMengen,
          nachbestellungen: nachbest.map(a => ({
            id: a.id, name: a.name, location: a.location,
            ist: istMengen[a.id], min: a.min, minEinheit: a.minEinheit,
          })),
          unterschrift: sigData,
          status:       'abgeschlossen',
        });

        alert(`✅ Lagercheck abgeschlossen!\n\n${nachbest.length} Artikel müssen nachbestellt werden.\n\nDer Wachenleiter wurde informiert.`);
        window.location.href = '../index.html';

      } catch (e) {
        alert('Fehler beim Speichern: ' + e.message);
      }
    };

    // ── Foto Modal ──
    window.openFoto = function(url, name) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML = `
        <div style="background:var(--surface);border-radius:16px;overflow:hidden;max-width:400px;width:100%;">
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:0.85rem;font-weight:600;">${name}</span>
            <button onclick="this.closest('div[style]').remove()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;">✕</button>
          </div>
          <img src="${url}" style="width:100%;max-height:360px;object-fit:contain;background:var(--surface2);">
        </div>`;
      modal.onclick = e => { if (e.target === modal) modal.remove(); };
      document.body.appendChild(modal);
    };

    // ── Screens ──
    function showScreen(name) {
      document.getElementById('screen-pin').classList.add('hidden');
      document.getElementById('screen-check').classList.add('hidden');
      document.getElementById('screen-sig').classList.add('hidden');
      document.getElementById(`screen-${name}`).classList.remove('hidden');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scanner – LAGER//APP</title>
  <link rel="stylesheet" href="../css/main.css">
  <!-- ZXing Barcode Scanner -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <style>
    .scanner-page { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

    /* ── KAMERA ── */
    .camera-wrap {
      position: relative;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%;
      display: block;
      max-height: 50vh;
      object-fit: cover;
    }

    /* Scan-Rahmen Overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 220px;
      height: 220px;
      position: relative;
    }

    .scan-frame::before,
    .scan-frame::after,
    .scan-frame .corner-br,
    .scan-frame .corner-bl {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--accent);
      border-style: solid;
    }

    .scan-frame::before  { top: 0;    left: 0;  border-width: 3px 0 0 3px; }
    .scan-frame::after   { top: 0;    right: 0; border-width: 3px 3px 0 0; }
    .scan-frame .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }
    .scan-frame .corner-bl { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }

    /* Scan-Linie Animation */
    .scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanMove 2s ease-in-out infinite;
      top: 50%;
    }

    @keyframes scanMove {
      0%   { top: 10%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 90%; opacity: 0; }
    }

    .scan-hint {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.8);
      font-family: 'IBM Plex Mono', monospace;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* ── CONTENT ── */
    .scanner-content {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── STATUS CARD ── */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-idle {
      text-align: center;
      padding: 12px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .status-icon { font-size: 2rem; margin-bottom: 6px; }

    /* ── RESULT CARD ── */
    .result-card {
      background: var(--surface);
      border: 2px solid var(--green);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-badge {
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }

    .badge-new     { background: rgba(249,115,22,0.15); color: var(--accent);  border: 1px solid rgba(249,115,22,0.3); }
    .badge-known   { background: rgba(34,197,94,0.15);  color: var(--green);   border: 1px solid rgba(34,197,94,0.3); }

    .result-title { font-size: 1rem; font-weight: 700; }
    .result-sub   { font-size: 0.72rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

    /* Scan Info Grid */
    .scan-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .scan-info-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .scan-info-label {
      font-size: 0.6rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 3px;
    }

    .scan-info-value {
      font-size: 0.88rem;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
    }

    .scan-info-value.warn { color: var(--red); }
    .scan-info-value.ok   { color: var(--green); }

    /* Artikel Auswahl (bei unbekanntem Produkt) */
    .artikel-select-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .artikel-select-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text2);
    }

    .artikel-search-input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .artikel-search-input:focus { border-color: var(--accent2); }
    .artikel-search-input::placeholder { color: var(--muted); }

    .artikel-suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .artikel-suggestion {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    .artikel-suggestion:active { background: var(--surface3); border-color: var(--accent2); }
    .artikel-suggestion.selected { background: rgba(14,165,233,0.1); border-color: var(--accent2); }

    .suggestion-name  { font-size: 0.82rem; font-weight: 600; }
    .suggestion-loc   { font-size: 0.65rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }

    /* ── CHARGEN LISTE ── */
    .chargen-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .chargen-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chargen-title { font-size: 0.82rem; font-weight: 700; }
    .chargen-count { font-size: 0.65rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

    .chargen-list { display: flex; flex-direction: column; }

    .charge-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .charge-item:last-child { border-bottom: none; }

    .charge-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .charge-info { flex: 1; min-width: 0; }
    .charge-lot  { font-size: 0.78rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
    .charge-date { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }
    .charge-days { font-size: 0.72rem; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }

    .charge-delete {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .charge-delete:active { color: var(--red); border-color: var(--red); }

    /* ── BUTTONS ── */
    .action-row {
      display: flex;
      gap: 10px;
    }

    .big-btn {
      flex: 1;
      height: 54px;
      border-radius: 12px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .big-btn:active { transform: scale(0.96); }
    .big-btn.primary { background: var(--accent);  color: white; }
    .big-btn.green   { background: var(--green);   color: white; }
    .big-btn.ghost   { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }

    /* ── KAMERA CONTROLS ── */
    .camera-controls {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #000;
      justify-content: center;
    }

    .cam-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 0.78rem;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: 'IBM Plex Mono', monospace;
    }

    .cam-btn.active { background: var(--accent); border-color: var(--accent); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.85rem;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      white-space: nowrap;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }

    .hidden { display: none !important; }

    /* Scrollbar */
    .artikel-suggestions::-webkit-scrollbar { width: 4px; }
    .artikel-suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body class="scanner-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="nav-logo">LAGER<span>//</span>APP</a>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </nav>

  <!-- KAMERA -->
  <div class="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="corner-br"></div>
        <div class="corner-bl"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-hint">GS1-Code auf Produkt halten</div>
  </div>

  <!-- Kamera Controls -->
  <div class="camera-controls">
    <button class="cam-btn active" id="btn-cam-back" onclick="switchCamera('back')">📷 Rückseite</button>
    <button class="cam-btn" id="btn-cam-front" onclick="switchCamera('front')">🤳 Vorderseite</button>
    <button class="cam-btn" id="btn-torch" onclick="toggleTorch()">🔦 Licht</button>
  </div>

  <!-- CONTENT -->
  <div class="scanner-content">

    <!-- Status / Ergebnis -->
    <div id="status-idle" class="status-card">
      <div class="status-idle">
        <div class="status-icon">📷</div>
        <div>Kamera auf GS1-Code halten</div>
        <div style="font-size:0.72rem;color:var(--muted);margin-top:4px;font-family:'IBM Plex Mono',monospace;">DataMatrix · QR · Barcode</div>
      </div>
    </div>

    <!-- Scan Ergebnis -->
    <div id="result-card" class="result-card hidden">
      <div class="result-header">
        <span class="result-badge" id="result-badge">NEU</span>
        <div>
          <div class="result-title" id="result-artikel-name">Unbekanntes Produkt</div>
          <div class="result-sub" id="result-gtin"></div>
        </div>
      </div>

      <div class="scan-info">
        <div class="scan-info-item">
          <div class="scan-info-label">Charge / LOT</div>
          <div class="scan-info-value" id="result-lot">–</div>
        </div>
        <div class="scan-info-item">
          <div class="scan-info-label">Verfallsdatum</div>
          <div class="scan-info-value" id="result-verfall">–</div>
        </div>
        <div class="scan-info-item">
          <div class="scan-info-label">Noch</div>
          <div class="scan-info-value" id="result-days">–</div>
        </div>
        <div class="scan-info-item">
          <div class="scan-info-label">Status</div>
          <div class="scan-info-value" id="result-status">–</div>
        </div>
      </div>

      <!-- Artikel Auswahl (nur bei unbekanntem Produkt) -->
      <div id="artikel-select-section" class="artikel-select-wrap hidden">
        <div class="artikel-select-label">⚠️ Unbekanntes Produkt – welcher Artikel ist das?</div>
        <input
          type="text"
          id="artikel-search"
          class="artikel-search-input"
          placeholder="Artikel suchen..."
          oninput="searchArtikel(this.value)"
          autocomplete="off"
        >
        <div class="artikel-suggestions" id="artikel-suggestions"></div>
      </div>

      <div class="action-row">
        <button class="big-btn ghost" onclick="resetScanner()">↺ Neu scannen</button>
        <button class="big-btn green" id="btn-speichern" onclick="speichern()">✅ Speichern</button>
      </div>
    </div>

    <!-- Chargen des aktuellen Artikels -->
    <div id="chargen-section" class="chargen-section hidden">
      <div class="chargen-header">
        <span class="chargen-title" id="chargen-artikel-name">Chargen</span>
        <span class="chargen-count" id="chargen-count">0 Chargen</span>
      </div>
      <div class="chargen-list" id="chargen-list"></div>
    </div>

  </div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Theme
    const savedTheme  = localStorage.getItem('lager-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme       = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    window.toggleTheme = function() {
      const cur  = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('lager-theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    };

    // Firebase
    const firebaseConfig = {
      apiKey:            "AIzaSyD1YY-cFQxyykfYQYPORwulzuF8t6Wgid4",
      authDomain:        "lagerbestellung-19970.firebaseapp.com",
      projectId:         "lagerbestellung-19970",
      storageBucket:     "lagerbestellung-19970.firebasestorage.app",
      messagingSenderId: "939056339904",
      appId:             "1:939056339904:web:6f33ca2f5a4cebd2780625",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let alleArtikel    = [];
    let currentUser    = null;
    let userRole       = null;
    let scanResult     = null; // { gtin, lot, verfall }
    let selectedArtikel = null;
    let codeReader     = null;
    let currentCamera  = 'back';
    let torchOn        = false;
    let scanning       = true;

    // ── Auth Check ──
    // Scanner ist durch PIN geschützt (sessionStorage) ODER durch Login
    onAuthStateChanged(auth, async user => {
      const pinAuth = sessionStorage.getItem('lager-pin-auth');

      if (!user && !pinAuth) {
        // Kein Login und kein PIN – zurück zur Check-Seite
        window.location.href = 'check.html';
        return;
      }

      if (user) {
        const snap = await getDoc(doc(db, 'users', user.uid));
        userRole    = snap.exists() ? snap.data().role : null;
        currentUser = user;
      } else {
        // PIN-authentifizierter Nutzer
        userRole    = 'scanner';
        currentUser = { displayName: sessionStorage.getItem('lager-pin-name') || 'Mitarbeiter' };
      }

      await loadArtikel();
      startScanner();
    });

    // ── Artikel laden ──
    async function loadArtikel() {
      const snap  = await getDocs(collection(db, 'artikel'));
      alleArtikel = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // ── GTIN → Artikel suchen ──
    function findArtikelByGtin(gtin) {
      return alleArtikel.find(a =>
        a.gtin === gtin ||
        a.ean  === gtin ||
        (a.gtins && a.gtins.includes(gtin))
      ) || null;
    }

    // ── GS1 DataMatrix parsen ──
    function parseGS1(raw) {
      const result = { gtin: null, lot: null, verfall: null, raw };
      try {
        // GS1 Application Identifiers
        // (01) = GTIN, (10) = LOT, (17) = Verfall YYMMDD
        const patterns = [
          { ai: '01', key: 'gtin',   len: 14 },
          { ai: '10', key: 'lot',    len: null }, // variable
          { ai: '17', key: 'verfall',len: 6  },
        ];

        let str = raw.replace(/[\x1D\x1E\x04]/g, '|'); // GS separator

        // Suche nach bekannten AIs
        const ai01 = str.match(/\(01\)(\d{14})/);
        const ai10 = str.match(/\(10\)([^\(]+)/);
        const ai17 = str.match(/\(17\)(\d{6})/);

        if (ai01) result.gtin   = ai01[1];
        if (ai10) result.lot    = ai10[1].trim().replace(/\|/g,'');
        if (ai17) {
          const d = ai17[1];
          result.verfall = `20${d.substring(0,2)}-${d.substring(2,4)}-${d.substring(4,6)}`;
        }

        // Fallback: roher GS1 ohne Klammern
        if (!result.gtin) {
          const m01 = raw.match(/^01(\d{14})/);
          if (m01) result.gtin = m01[1];
        }

        if (!result.lot) {
          const m10 = raw.match(/10([^\x1D]{1,20})/);
          if (m10) result.lot = m10[1].trim();
        }

        if (!result.verfall) {
          const m17 = raw.match(/17(\d{6})/);
          if (m17) {
            const d = m17[1];
            result.verfall = `20${d.substring(0,2)}-${d.substring(2,4)}-${d.substring(4,6)}`;
          }
        }

        // QR-Code Fallback: direkt LOT + Datum
        if (!result.gtin && !result.lot) {
          const lotMatch = raw.match(/LOT[:\s]?([A-Z0-9]+)/i);
          if (lotMatch) result.lot = lotMatch[1];
          const dateMatch = raw.match(/(\d{4}-\d{2}-\d{2})/);
          if (dateMatch) result.verfall = dateMatch[1];
        }

      } catch (e) { console.error('Parse error:', e); }
      return result;
    }

    // ── Tage bis Verfall berechnen ──
    function daysUntil(dateStr) {
      if (!dateStr) return null;
      const diff = (new Date(dateStr) - new Date()) / (1000 * 60 * 60 * 24);
      return Math.round(diff);
    }

    // ── Scanner starten ──
    async function startScanner() {
      try {
        const hints = new Map();
        const formats = [
          ZXing.BarcodeFormat.DATA_MATRIX,
          ZXing.BarcodeFormat.QR_CODE,
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.CODE_128,
          ZXing.BarcodeFormat.CODE_39,
        ];
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        codeReader = new ZXing.BrowserMultiFormatReader(hints);

        const constraints = {
          video: {
            facingMode: currentCamera === 'back' ? 'environment' : 'user',
            width: { ideal: 1280 },
            height: { ideal: 720 },
          }
        };

        await codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
          if (result && scanning) {
            scanning = false;
            onScanResult(result.getText());
          }
        });

      } catch (e) {
        console.error('Scanner error:', e);
        showToast('Kamera konnte nicht gestartet werden: ' + e.message, 'error');
      }
    }

    // ── Scan Ergebnis verarbeiten ──
    function onScanResult(raw) {
      // Vibration als Feedback
      if (navigator.vibrate) navigator.vibrate(100);

      const parsed = parseGS1(raw);
      scanResult   = parsed;

      // Artikel anhand GTIN finden
      const gefunden = parsed.gtin ? findArtikelByGtin(parsed.gtin) : null;
      selectedArtikel = gefunden;

      // UI updaten
      document.getElementById('status-idle').classList.add('hidden');
      const card = document.getElementById('result-card');
      card.classList.remove('hidden');

      // GTIN anzeigen
      document.getElementById('result-gtin').textContent =
        parsed.gtin ? `GTIN: ${parsed.gtin}` : parsed.raw?.substring(0, 30) || '';

      // LOT
      document.getElementById('result-lot').textContent = parsed.lot || '–';

      // Verfallsdatum
      const days = daysUntil(parsed.verfall);
      document.getElementById('result-verfall').textContent =
        parsed.verfall ? new Date(parsed.verfall).toLocaleDateString('de-DE') : '–';

      if (days !== null) {
        const dEl = document.getElementById('result-days');
        dEl.textContent = days <= 0 ? 'ABGELAUFEN' : `${days} Tage`;
        dEl.className   = `scan-info-value ${days <= 30 ? 'warn' : 'ok'}`;

        const sEl = document.getElementById('result-status');
        if (days <= 0)  { sEl.textContent = '🔴 Abgelaufen'; sEl.className = 'scan-info-value warn'; }
        else if (days <= 7)  { sEl.textContent = '🔴 Kritisch'; sEl.className = 'scan-info-value warn'; }
        else if (days <= 30) { sEl.textContent = '🟡 Bald'; sEl.className = 'scan-info-value warn'; }
        else                 { sEl.textContent = '🟢 OK'; sEl.className = 'scan-info-value ok'; }
      }

      if (gefunden) {
        // Bekanntes Produkt
        document.getElementById('result-badge').textContent = '✅ BEKANNT';
        document.getElementById('result-badge').className   = 'result-badge badge-known';
        document.getElementById('result-artikel-name').textContent = gefunden.name;
        document.getElementById('artikel-select-section').classList.add('hidden');
        showChargen(gefunden);
      } else {
        // Unbekanntes Produkt
        document.getElementById('result-badge').textContent = '❓ UNBEKANNT';
        document.getElementById('result-badge').className   = 'result-badge badge-new';
        document.getElementById('result-artikel-name').textContent = 'Produkt nicht erkannt';
        document.getElementById('artikel-select-section').classList.remove('hidden');
        document.getElementById('chargen-section').classList.add('hidden');
      }
    }

    // ── Chargen anzeigen ──
    function showChargen(artikel) {
      const chargen  = artikel.chargen || [];
      const section  = document.getElementById('chargen-section');
      const list     = document.getElementById('chargen-list');
      section.classList.remove('hidden');
      document.getElementById('chargen-artikel-name').textContent = artikel.name;
      document.getElementById('chargen-count').textContent = `${chargen.length} Charge${chargen.length !== 1 ? 'n' : ''}`;

      if (chargen.length === 0) {
        list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:0.82rem;">Noch keine Chargen erfasst</div>';
        return;
      }

      // Sortiert nach Verfallsdatum (früheste zuerst)
      const sorted = [...chargen].sort((a, b) => new Date(a.verfall) - new Date(b.verfall));

      list.innerHTML = sorted.map((c, i) => {
        const days  = daysUntil(c.verfall);
        const color = days <= 0 ? 'var(--red)' : days <= 7 ? 'var(--red)' : days <= 30 ? 'var(--yellow)' : 'var(--green)';
        const label = days <= 0 ? 'ABGELAUFEN' : days <= 30 ? `${days} Tage` : `${Math.round(days/30)} Monate`;
        return `
          <div class="charge-item">
            <div class="charge-dot" style="background:${color}"></div>
            <div class="charge-info">
              <div class="charge-lot">LOT: ${c.lot || '–'}</div>
              <div class="charge-date">Verfall: ${c.verfall ? new Date(c.verfall).toLocaleDateString('de-DE') : '–'}</div>
            </div>
            <div class="charge-days" style="color:${color}">${label}</div>
            ${userRole === 'admin' || userRole === 'wachenleiter'
              ? `<button class="charge-delete" onclick="deleteCharge('${artikel.id}', ${i})" title="Löschen">✕</button>`
              : ''}
          </div>`;
      }).join('');
    }

    // ── Artikel Suche ──
    window.searchArtikel = function(query) {
      const q    = query.toLowerCase().trim();
      const list = document.getElementById('artikel-suggestions');

      if (!q) { list.innerHTML = ''; return; }

      const results = alleArtikel
        .filter(a =>
          a.name?.toLowerCase().includes(q) ||
          a.aliases?.some(al => al.toLowerCase().includes(q))
        )
        .slice(0, 8);

      list.innerHTML = results.map(a => `
        <div class="artikel-suggestion" onclick="selectArtikel('${a.id}')">
          <div class="suggestion-name">${a.name}</div>
          <div class="suggestion-loc">${a.lp || ''} · ${a.location || ''}</div>
        </div>`).join('') || '<div style="padding:10px;color:var(--muted);font-size:0.82rem;">Kein Artikel gefunden</div>';
    };

    window.selectArtikel = function(id) {
      selectedArtikel = alleArtikel.find(a => a.id === id);
      document.getElementById('result-artikel-name').textContent = selectedArtikel.name;
      document.getElementById('artikel-search').value = selectedArtikel.name;
      document.getElementById('artikel-suggestions').innerHTML = '';
      document.getElementById('result-badge').textContent = '✅ AUSGEWÄHLT';
      document.getElementById('result-badge').className   = 'result-badge badge-known';
      showChargen(selectedArtikel);
    };

    // ── Speichern ──
    window.speichern = async function() {
      if (!selectedArtikel) {
        showToast('Bitte zuerst einen Artikel auswählen', 'error');
        return;
      }

      if (userRole === 'mitarbeiter') {
        showToast('Nur Wachenleiter & Admin können speichern', 'error');
        return;
      }

      const artikelRef = doc(db, 'artikel', selectedArtikel.id);
      const chargen    = selectedArtikel.chargen || [];

      // Prüfen ob diese Charge schon existiert
      const exists = chargen.find(c => c.lot === scanResult.lot && c.lot);

      if (exists) {
        // Verfallsdatum aktualisieren falls nötig
        exists.verfall = scanResult.verfall || exists.verfall;
        exists.gtin    = scanResult.gtin || exists.gtin;
        showToast(`Charge ${scanResult.lot} aktualisiert ✅`);
      } else {
        // Neue Charge hinzufügen
        chargen.push({
          lot:    scanResult.lot    || 'Unbekannt',
          verfall:scanResult.verfall|| null,
          gtin:   scanResult.gtin   || null,
          erfasst:new Date().toISOString(),
        });
        showToast(`Neue Charge gespeichert ✅`);
      }

      // GTIN mit Artikel verknüpfen (für zukünftige automatische Erkennung)
      const updateData = { chargen };
      if (scanResult.gtin && !selectedArtikel.gtin) {
        updateData.gtin = scanResult.gtin;
        const gtins = selectedArtikel.gtins || [];
        if (!gtins.includes(scanResult.gtin)) gtins.push(scanResult.gtin);
        updateData.gtins = gtins;
      }

      try {
        await updateDoc(artikelRef, updateData);
        // Lokal updaten
        const idx = alleArtikel.findIndex(a => a.id === selectedArtikel.id);
        if (idx >= 0) { alleArtikel[idx] = { ...alleArtikel[idx], ...updateData }; }
        selectedArtikel = alleArtikel.find(a => a.id === selectedArtikel.id);
        showChargen(selectedArtikel);
        setTimeout(() => resetScanner(), 1500);
      } catch (e) {
        showToast('Fehler: ' + e.message, 'error');
      }
    };

    // ── Charge löschen ──
    window.deleteCharge = async function(artikelId, index) {
      if (!confirm('Charge wirklich löschen?')) return;
      const a       = alleArtikel.find(x => x.id === artikelId);
      const chargen = [...(a.chargen || [])];
      chargen.splice(index, 1);
      await updateDoc(doc(db, 'artikel', artikelId), { chargen });
      const idx = alleArtikel.findIndex(x => x.id === artikelId);
      if (idx >= 0) alleArtikel[idx].chargen = chargen;
      if (selectedArtikel?.id === artikelId) {
        selectedArtikel.chargen = chargen;
        showChargen(selectedArtikel);
      }
      showToast('Charge gelöscht');
    };

    // ── Reset ──
    window.resetScanner = function() {
      scanResult      = null;
      selectedArtikel = null;
      scanning        = true;
      document.getElementById('result-card').classList.add('hidden');
      document.getElementById('chargen-section').classList.add('hidden');
      document.getElementById('status-idle').classList.remove('hidden');
      document.getElementById('artikel-search').value = '';
      document.getElementById('artikel-suggestions').innerHTML = '';
    };

    // ── Kamera wechseln ──
    window.switchCamera = async function(side) {
      currentCamera = side;
      document.getElementById('btn-cam-back').classList.toggle('active', side === 'back');
      document.getElementById('btn-cam-front').classList.toggle('active', side === 'front');
      if (codeReader) codeReader.reset();
      scanning = true;
      await startScanner();
    };

    // ── Taschenlampe ──
    window.toggleTorch = async function() {
      torchOn = !torchOn;
      const btn = document.getElementById('btn-torch');
      btn.classList.toggle('active', torchOn);
      try {
        const stream = document.getElementById('video').srcObject;
        const track  = stream?.getVideoTracks()[0];
        if (track?.getCapabilities?.()?.torch) {
          await track.applyConstraints({ advanced: [{ torch: torchOn }] });
        }
      } catch {}
    };

    // ── Toast ──
    function showToast(msg, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>

</body>
</html>

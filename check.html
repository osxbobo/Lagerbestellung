<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lagercheck – LAGER//APP</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .check-page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── PIN ── */
    .pin-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .pin-box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 24px; align-items: center; }
    .pin-header { text-align: center; }
    .pin-logo  { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
    .pin-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .pin-sub   { font-size: 0.82rem; color: var(--text2); }
    .pin-card  { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
    .pin-dots  { display: flex; justify-content: center; gap: 14px; padding: 8px 0; }
    .pin-dot   { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); transition: all 0.15s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }
    .pin-grid  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key {
      aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-family: 'IBM Plex Mono', monospace; font-size: 1.2rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.1s, border-color 0.1s;
    }
    .pin-key.pressed, .pin-key:active { background: var(--surface3); transform: scale(0.92); border-color: var(--accent); color: var(--accent); }
    .pin-key.confirm { background: var(--accent); border-color: var(--accent); color: white; }
    .pin-key.confirm.pressed, .pin-key.confirm:active { background: var(--accent-hover); transform: scale(0.92); }
    .pin-key.del { color: var(--muted); }
    .name-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; text-align: center; }
    .name-input:focus { border-color: var(--accent2); }
    .name-input::placeholder { color: var(--muted); }
    .pin-error { text-align: center; font-size: 0.78rem; color: var(--red); min-height: 20px; }

    /* ── CHECK SCREEN ── */
    .check-screen { flex: 1; display: flex; flex-direction: column; padding-bottom: 80px; }

    .check-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 56px;
      z-index: 10;
    }

    .check-bereich {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .check-body {
      flex: 1;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── ARTIKEL CARD – groß & touch-freundlich ── */
    .artikel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s;
      border-left: 4px solid var(--border);
    }

    .artikel-card.ok   { border-left-color: var(--green); background: rgba(34,197,94,0.04); }
    .artikel-card.warn { border-left-color: var(--red);   background: rgba(239,68,68,0.04); }

    .artikel-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }

    .artikel-info { flex: 1; min-width: 0; }
    .artikel-name { font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
    .artikel-sub  { font-size: 0.72rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
    .artikel-soll { font-size: 0.75rem; color: var(--text2); margin-top: 4px; }

    .info-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--accent2); font-size: 0.75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── MENGENAUSWAHL ── */
    .menge-section { display: flex; flex-direction: column; gap: 8px; }

    /* Schnellauswahl Chips */
    .chips-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .chip {
      min-width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.12s;
      user-select: none;
      -webkit-user-select: none;
    }

    .chip:active, .chip.pressed { transform: scale(0.91); background: var(--surface3); border-color: var(--accent2); color: var(--accent2); }
    .chip.selected { background: var(--accent2); border-color: var(--accent2); color: white; }
    .chip.warn-chip.selected { background: var(--red); border-color: var(--red); color: white; }

    /* Plus/Minus row */
    .plusminus-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pm-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }

    .pm-btn:active, .pm-btn.pressed { transform: scale(0.88); background: var(--surface3); border-color: var(--accent); color: var(--accent); }
    .pm-btn.minus:active, .pm-btn.minus.pressed { border-color: var(--red); color: var(--red); }

    .pm-display {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .pm-display:focus { border-color: var(--accent2); }
    .pm-display.low  { border-color: var(--red);   color: var(--red); }
    .pm-display.good { border-color: var(--green); color: var(--green); }

    /* ── FIXED BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      z-index: 20;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .bottom-nav-btn {
      flex: 1;
      height: 52px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .bottom-nav-btn:active { transform: scale(0.96); }
    .bottom-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .bottom-nav-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .bottom-nav-btn.finish  { background: var(--green);  border-color: var(--green);  color: white; flex: 2; }

    /* ── UNTERSCHRIFT ── */
    .sig-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .sig-box { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }
    .sig-title { font-size: 1.1rem; font-weight: 700; text-align: center; }
    .summary-grid { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .summary-row { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .summary-row:last-child { border-bottom: none; }
    .summary-key { color: var(--muted); }
    .summary-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; font-weight: 600; }
    .sig-canvas-wrap { background: var(--surface); border: 1.5px dashed var(--border); border-radius: 12px; overflow: hidden; position: relative; }
    #sig-canvas { display: block; width: 100%; height: 150px; cursor: crosshair; touch-action: none; }
    .sig-line { position: absolute; bottom: 28px; left: 16px; right: 16px; height: 1px; background: var(--border); pointer-events: none; }
    .sig-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.72rem; color: var(--muted); pointer-events: none; font-family: 'IBM Plex Mono', monospace; transition: opacity 0.2s; }
    .sig-clear { position: absolute; top: 8px; right: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.65rem; padding: 4px 10px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; touch-action: manipulation; }

    .hidden { display: none !important; }
  </style>
</head>
<body class="check-page">

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="nav-logo">LAGER<span>//</span>APP</a>
      <div class="nav-right">
        <span id="nav-user" class="mono text-xs text-muted hide-mobile"></span>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</button>
      </div>
    </div>
  </nav>

  <!-- ── PIN ── -->
  <div id="screen-pin" class="pin-screen">
    <div class="pin-box">
      <div class="pin-header">
        <div class="pin-logo">LAGER//APP</div>
        <h1 class="pin-title">Lagercheck</h1>
        <p class="pin-sub">PIN eingeben und Name eintragen</p>
      </div>
      <div class="pin-card">
        <input type="text" id="name-input" class="name-input" placeholder="Dein Name..." maxlength="40" autocomplete="off">
        <div class="pin-dots">
          <div class="pin-dot" id="dot-0"></div>
          <div class="pin-dot" id="dot-1"></div>
          <div class="pin-dot" id="dot-2"></div>
          <div class="pin-dot" id="dot-3"></div>
        </div>
        <div class="pin-grid">
          <div class="pin-key" data-key="1">1</div>
          <div class="pin-key" data-key="2">2</div>
          <div class="pin-key" data-key="3">3</div>
          <div class="pin-key" data-key="4">4</div>
          <div class="pin-key" data-key="5">5</div>
          <div class="pin-key" data-key="6">6</div>
          <div class="pin-key" data-key="7">7</div>
          <div class="pin-key" data-key="8">8</div>
          <div class="pin-key" data-key="9">9</div>
          <div class="pin-key del" data-key="del">⌫</div>
          <div class="pin-key" data-key="0">0</div>
          <div class="pin-key confirm" data-key="confirm">✓</div>
        </div>
        <div class="pin-error" id="pin-error"></div>
      </div>
    </div>
  </div>

  <!-- ── CHECK ── -->
  <div id="screen-check" class="check-screen hidden">
    <div class="check-header">
      <div class="check-bereich" id="check-bereich-name">Bereich</div>
      <div class="progress-wrap"><div class="progress-fill" id="check-progress"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:0.62rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:4px;">
        <span id="check-progress-label">Bereich 1 von 1</span>
        <span id="check-progress-pct">0%</span>
      </div>
    </div>

    <div class="check-body" id="check-body"></div>

    <!-- Fixed Bottom Navigation -->
    <div class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-btn" id="btn-prev" onclick="prevBereich()">← Zurück</button>
      <button class="bottom-nav-btn primary" id="btn-next" onclick="nextBereich()">Weiter →</button>
      <button class="bottom-nav-btn finish hidden" id="btn-finish" onclick="showSignature()">✅ Abschließen</button>
    </div>
  </div>

  <!-- ── UNTERSCHRIFT ── -->
  <div id="screen-sig" class="sig-screen hidden">
    <div class="sig-box">
      <div class="sig-title">✅ Check abgeschlossen</div>
      <div class="summary-grid" id="summary-grid"></div>
      <div>
        <div class="section-label mb-8">Unterschrift</div>
        <div class="sig-canvas-wrap">
          <canvas id="sig-canvas"></canvas>
          <div class="sig-line"></div>
          <div class="sig-hint" id="sig-hint">Hier unterschreiben...</div>
          <button class="sig-clear" onclick="clearSig()">Löschen</button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="submitCheck()">📄 PDF erstellen & absenden</button>
      <button class="btn btn-ghost btn-full" onclick="backToCheck()">← Zurück zum Check</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, addDoc, query, orderBy, serverTimestamp }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Theme
    const savedTheme  = localStorage.getItem('lager-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme       = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    window.toggleTheme = function() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('lager-theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
    };

    // Firebase
    const firebaseConfig = {
      apiKey:            "AIzaSyD1YY-cFQxyykfYQYPORwulzuF8t6Wgid4",
      authDomain:        "lagerbestellung-19970.firebaseapp.com",
      projectId:         "lagerbestellung-19970",
      storageBucket:     "lagerbestellung-19970.firebasestorage.app",
      messagingSenderId: "939056339904",
      appId:             "1:939056339904:web:6f33ca2f5a4cebd2780625",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    let correctPin   = '1234';
    let alleArtikel  = [];
    let alleBereiche = [];
    let istMengen    = {};
    let currentIdx   = 0;
    let userName     = '';
    let pinValue     = '';

    // ── QUICK CHIPS config ──
    const QUICK_VALUES = [0, 1, 2, 3, 5, 10];

    // ── PIN ──
    function handlePinKey(key) {
      document.getElementById('pin-error').textContent = '';
      if (key === 'del') {
        pinValue = pinValue.slice(0, -1);
        updateDots();
      } else if (key === 'confirm') {
        pinConfirm();
      } else {
        if (pinValue.length >= 4) return;
        pinValue += key;
        updateDots();
      }
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById(`dot-${i}`).classList.toggle('filled', i < pinValue.length);
      }
    }

    document.querySelectorAll('.pin-key').forEach(btn => {
      const key = btn.dataset.key;
      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        btn.classList.add('pressed');
        handlePinKey(key);
      }, { passive: false });
      btn.addEventListener('touchend', () => setTimeout(() => btn.classList.remove('pressed'), 100));
      btn.addEventListener('click', () => handlePinKey(key));
    });

    async function pinConfirm() {
      userName = document.getElementById('name-input').value.trim();
      const err = document.getElementById('pin-error');
      if (!userName) { err.textContent = 'Bitte deinen Namen eingeben.'; return; }
      if (pinValue.length < 4) { err.textContent = 'Bitte 4-stelligen PIN eingeben.'; return; }
      try {
        const snap = await getDoc(doc(db, 'config', 'app'));
        if (snap.exists()) correctPin = snap.data().pin || '1234';
      } catch {}
      if (pinValue !== correctPin) {
        err.textContent = 'Falscher PIN.';
        pinValue = ''; updateDots(); return;
      }
      document.getElementById('nav-user').textContent = userName;
      await loadCheckData();
      showScreen('check');
    }

    // ── Load ──
    async function loadCheckData() {
      const [bSnap, aSnap] = await Promise.all([
        getDocs(query(collection(db, 'bereiche'), orderBy('reihenfolge'))),
        getDocs(collection(db, 'artikel')),
      ]);
      alleBereiche = bSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      alleArtikel  = aSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderBereich(0);
    }

    // ── Render Bereich ──
    function renderBereich(idx) {
      currentIdx = idx;
      const bereich = alleBereiche[idx];
      const artikel = alleArtikel.filter(a => a.bereich === bereich.id);
      const pct     = Math.round(((idx + 1) / alleBereiche.length) * 100);
      const isLast  = idx === alleBereiche.length - 1;

      document.getElementById('check-bereich-name').textContent  = bereich.name;
      document.getElementById('check-progress').style.width       = pct + '%';
      document.getElementById('check-progress-label').textContent = `Bereich ${idx + 1} von ${alleBereiche.length}`;
      document.getElementById('check-progress-pct').textContent   = pct + '%';
      document.getElementById('btn-prev').disabled = idx === 0;

      // Letzter Bereich → Weiter verstecken, Abschließen zeigen
      document.getElementById('btn-next').classList.toggle('hidden', isLast);
      document.getElementById('btn-finish').classList.toggle('hidden', !isLast);

      document.getElementById('check-body').innerHTML = artikel.map(a => {
        const ist   = istMengen[a.id] !== undefined ? istMengen[a.id] : '';
        const low   = ist !== '' && a.min != null && Number(ist) < a.min;
        const good  = ist !== '' && a.min != null && Number(ist) >= a.min;

        const chipsHtml = QUICK_VALUES.map(v => {
          const isSelected = ist !== '' && Number(ist) === v;
          const isWarn     = isSelected && low;
          return `<div class="chip ${isSelected ? (isWarn ? 'warn-chip selected' : 'selected') : ''}" 
            data-id="${a.id}" data-val="${v}">${v}</div>`;
        }).join('');

        return `
          <div class="artikel-card ${low?'warn':good?'ok':''}" id="card-${a.id}">
            <div class="artikel-top">
              <div class="artikel-info">
                <div class="artikel-name">${a.name}</div>
                <div class="artikel-sub">${a.lp||''} · ${a.location||''}</div>
                ${a.min != null ? `<div class="artikel-soll">MIN ${a.min} ${a.minEinheit||''} · MAX ${a.max} ${a.maxEinheit||''}</div>` : ''}
                ${a.hinweis ? `<div class="artikel-soll" style="color:var(--accent2)">💡 ${a.hinweis}</div>` : ''}
              </div>
              ${a.fotoUrl ? `<button class="info-btn" data-foto="${a.fotoUrl}" data-name="${a.name.replace(/"/g,'&quot;')}">ℹ</button>` : ''}
            </div>
            <div class="menge-section">
              <div class="chips-row" data-id="${a.id}">${chipsHtml}</div>
              <div class="plusminus-row">
                <button class="pm-btn minus" data-id="${a.id}" data-action="minus">−</button>
                <input class="pm-display ${low?'low':good?'good':''}" id="ist-${a.id}" type="number" inputmode="numeric" placeholder="?" value="${ist}" min="0">
                <button class="pm-btn plus"  data-id="${a.id}" data-action="plus">+</button>
              </div>
            </div>
          </div>`;
      }).join('') || `<div class="text-muted text-sm" style="padding:30px;text-align:center;">Keine Artikel in diesem Bereich</div>`;

      // Attach touch listeners for chips and +/- buttons
      attachListeners();
    }

    // ── Listeners ──
    function attachListeners() {
      // Chips
      document.querySelectorAll('.chip').forEach(chip => {
        const id  = chip.dataset.id;
        const val = parseInt(chip.dataset.val);

        chip.addEventListener('touchstart', e => {
          e.preventDefault();
          chip.classList.add('pressed');
          setIst(id, val);
        }, { passive: false });

        chip.addEventListener('touchend', () => setTimeout(() => chip.classList.remove('pressed'), 100));
        chip.addEventListener('click', () => setIst(id, val));
      });

      // +/- Buttons
      document.querySelectorAll('.pm-btn').forEach(btn => {
        const id     = btn.dataset.id;
        const action = btn.dataset.action;

        btn.addEventListener('touchstart', e => {
          e.preventDefault();
          btn.classList.add('pressed');
          const cur = parseInt(document.getElementById(`ist-${id}`).value) || 0;
          const next = action === 'plus' ? cur + 1 : Math.max(0, cur - 1);
          setIst(id, next);
        }, { passive: false });

        btn.addEventListener('touchend', () => setTimeout(() => btn.classList.remove('pressed'), 100));

        btn.addEventListener('click', () => {
          const cur  = parseInt(document.getElementById(`ist-${id}`).value) || 0;
          const next = action === 'plus' ? cur + 1 : Math.max(0, cur - 1);
          setIst(id, next);
        });
      });

      // Direct input
      document.querySelectorAll('.pm-display').forEach(input => {
        const id = input.id.replace('ist-', '');
        input.addEventListener('change', () => setIst(id, parseInt(input.value) || 0));
      });

      // Info buttons
      document.querySelectorAll('.info-btn').forEach(btn => {
        btn.addEventListener('click', () => openFoto(btn.dataset.foto, btn.dataset.name));
      });
    }

    // ── Set Menge ──
    function setIst(id, val) {
      istMengen[id] = val;
      const a    = alleArtikel.find(x => x.id === id);
      const low  = a?.min != null && val < a.min;
      const good = a?.min != null && val >= a.min;

      // Update display input
      const input = document.getElementById(`ist-${id}`);
      if (input) {
        input.value = val;
        input.className = `pm-display ${low?'low':good?'good':''}`;
      }

      // Update card border
      const card = document.getElementById(`card-${id}`);
      if (card) card.className = `artikel-card ${low?'warn':good?'ok':''}`;

      // Update chips
      document.querySelectorAll(`.chip[data-id="${id}"]`).forEach(chip => {
        const chipVal = parseInt(chip.dataset.val);
        const isSelected = chipVal === val;
        const isWarn     = isSelected && low;
        chip.className = `chip ${isSelected ? (isWarn ? 'warn-chip selected' : 'selected') : ''}`;
      });
    }

    window.prevBereich = () => { if (currentIdx > 0) renderBereich(currentIdx - 1); };
    window.nextBereich = () => { if (currentIdx < alleBereiche.length - 1) renderBereich(currentIdx + 1); };

    // ── Signature ──
    window.showSignature = function() {
      const filled   = Object.keys(istMengen).length;
      const nachbest = alleArtikel.filter(a => istMengen[a.id] !== undefined && a.min != null && Number(istMengen[a.id]) < a.min).length;
      document.getElementById('summary-grid').innerHTML = `
        <div class="summary-row"><span class="summary-key">Mitarbeiter</span><span class="summary-val">${userName}</span></div>
        <div class="summary-row"><span class="summary-key">Datum</span><span class="summary-val">${new Date().toLocaleDateString('de-DE')} · ${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span></div>
        <div class="summary-row"><span class="summary-key">Geprüfte Artikel</span><span class="summary-val">${filled} / ${alleArtikel.length}</span></div>
        <div class="summary-row"><span class="summary-key">Nachbestellen</span><span class="summary-val" style="color:${nachbest>0?'var(--red)':'var(--green)'}">${nachbest} Artikel</span></div>`;
      showScreen('sig');
      initCanvas();
    };

    window.backToCheck = () => showScreen('check');

    // ── Canvas ──
    let drawing = false, hasSig = false;
    function initCanvas() {
      const canvas = document.getElementById('sig-canvas');
      const ctx    = canvas.getContext('2d');
      canvas.width  = canvas.parentElement.clientWidth;
      canvas.height = 150;
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX-r.left)*(canvas.width/r.width), y: (t.clientY-r.top)*(canvas.height/r.height) };
      }
      canvas.addEventListener('mousedown',  e => { drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
      canvas.addEventListener('mousemove',  e => { if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSig=true; document.getElementById('sig-hint').style.opacity='0'; });
      canvas.addEventListener('mouseup',    ()=>drawing=false);
      canvas.addEventListener('mouseleave', ()=>drawing=false);
      canvas.addEventListener('touchstart', e=>{ e.preventDefault(); drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); },{passive:false});
      canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSig=true; document.getElementById('sig-hint').style.opacity='0'; },{passive:false});
      canvas.addEventListener('touchend',   ()=>drawing=false);
    }

    window.clearSig = function() {
      const c = document.getElementById('sig-canvas');
      c.getContext('2d').clearRect(0,0,c.width,c.height);
      hasSig=false;
      document.getElementById('sig-hint').style.opacity='1';
    };

    // ── Submit ──
    window.submitCheck = async function() {
      if (!hasSig) { alert('Bitte zuerst unterschreiben!'); return; }
      const nachbest = alleArtikel.filter(a => istMengen[a.id]!==undefined && a.min!=null && Number(istMengen[a.id])<a.min);
      try {
        await addDoc(collection(db,'bestellungen'), {
          mitarbeiter: userName, datum: serverTimestamp(), istMengen,
          nachbestellungen: nachbest.map(a=>({id:a.id,name:a.name,location:a.location,ist:istMengen[a.id],min:a.min,minEinheit:a.minEinheit})),
          unterschrift: document.getElementById('sig-canvas').toDataURL('image/png'),
          status: 'abgeschlossen',
        });
        alert(`✅ Lagercheck abgeschlossen!\n\n${nachbest.length} Artikel müssen nachbestellt werden.`);
        window.location.href = '../index.html';
      } catch(e) { alert('Fehler: '+e.message); }
    };

    // ── Foto ──
    window.openFoto = function(url, name) {
      const modal = document.createElement('div');
      modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML=`<div style="background:var(--surface);border-radius:16px;overflow:hidden;max-width:420px;width:100%;"><div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"><span style="font-size:0.9rem;font-weight:600;">${name}</span><button onclick="this.closest('div[style]').remove()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 8px;touch-action:manipulation;">✕</button></div><img src="${url}" style="width:100%;max-height:380px;object-fit:contain;background:var(--surface2);"></div>`;
      modal.onclick=e=>{ if(e.target===modal)modal.remove(); };
      document.body.appendChild(modal);
    };

    // ── Screens ──
    function showScreen(name) {
      ['pin','check','sig'].forEach(s => document.getElementById(`screen-${s}`).classList.toggle('hidden', s!==name));
    }
  </script>
</body>
</html>
